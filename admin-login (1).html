<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proplio Admin — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080B10;--s1:#0E1219;--s2:#141820;--s3:#1C2230;
      --rim:rgba(255,255,255,0.055);--rim2:rgba(255,255,255,0.09);
      --ink:#E4EAF4;--ink2:#7A8BA8;--ink3:#3D4E68;
      --rose:#F0506E;--rose-dim:rgba(240,80,110,0.09);
      --accent:#00C875;--acc-dim:rgba(0,200,117,0.09);
    }
    html,body{height:100%}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;-webkit-font-smoothing:antialiased}
    .wrap{width:100%;max-width:380px}
    .logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:2rem;text-decoration:none}
    .logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--rose),#C0392B);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.75rem;font-weight:800;color:#fff}
    .logo-text{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--ink)}
    .logo-text em{font-style:normal;color:var(--rose)}
    .admin-badge{display:flex;align-items:center;justify-content:center;gap:.5rem;background:var(--rose-dim);border:1px solid rgba(240,80,110,.15);border-radius:8px;padding:.55rem;margin-bottom:1.5rem;font-size:.72rem;color:var(--rose);font-weight:600}
    .card{background:var(--s1);border-radius:14px;border:1px solid var(--rim);padding:24px}
    .card h2{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--ink);margin-bottom:1.25rem;letter-spacing:-.01em}
    .msg{padding:.65rem .9rem;border-radius:8px;font-size:.75rem;margin-bottom:.85rem;display:none;line-height:1.5}
    .msg.on{display:block}
    .msg.err{background:var(--rose-dim);border:1px solid rgba(240,80,110,.2);color:var(--rose)}
    .fld{margin-bottom:.8rem}
    .fld label{display:block;font-size:.62rem;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
    .fld input{width:100%;padding:.62rem .85rem;background:var(--s2);border:1px solid var(--rim2);border-radius:8px;font-size:.82rem;font-family:'Inter',sans-serif;color:var(--ink);outline:none;transition:.12s}
    .fld input:focus{border-color:var(--rose);background:var(--s3)}
    .fld input::placeholder{color:var(--ink3)}
    .btn{width:100%;padding:.78rem;background:var(--rose);color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s;margin-top:.25rem}
    .btn:hover{background:#FF6B82}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .warn{font-size:.66rem;color:var(--ink3);text-align:center;margin-top:1rem;line-height:1.6;padding:.75rem;background:var(--s1);border:1px solid var(--rim);border-radius:8px}
  </style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="logo">
    <div class="logo-mark">A</div>
    <div class="logo-text">Prop<em>lio</em> Admin</div>
  </a>
  <div class="admin-badge">🔐 Zone d'administration — Accès restreint</div>
  <div class="card">
    <h2>Connexion administrateur</h2>
    <div class="msg err" id="msg-err"></div>
    <div class="fld"><label>Identifiant admin</label><input type="text" id="admin-id" placeholder="admin@proplio.sn" autocomplete="off"/></div>
    <div class="fld"><label>Mot de passe</label><input type="password" id="admin-pwd" placeholder="••••••••••••" autocomplete="off"/></div>
    <div class="fld"><label>Code 2FA (6 chiffres)</label><input type="text" id="admin-2fa" placeholder="000000" maxlength="6" autocomplete="off"/></div>
    <button class="btn" id="btn-login" onclick="doLogin()">Accéder au panel →</button>
  </div>
  <p class="warn">⚠️ Toutes les connexions sont enregistrées et surveillées.<br/>Accès non autorisé passible de poursuites.</p>
</div>
<script>
const CREDS={id:'admin@proplio.sn',pwd:'ProplioAdmin2026!',code:'123456'}

function doLogin(){
  const id=document.getElementById('admin-id').value.trim()
  const pwd=document.getElementById('admin-pwd').value
  const code=document.getElementById('admin-2fa').value.trim()
  const btn=document.getElementById('btn-login')
  const err=document.getElementById('msg-err')
  err.classList.remove('on')
  if(!id||!pwd||!code){err.textContent='Tous les champs sont obligatoires.';err.classList.add('on');return}
  btn.disabled=true;btn.textContent='Vérification…'
  setTimeout(()=>{
    if(id===CREDS.id&&pwd===CREDS.pwd&&code===CREDS.code){
      localStorage.setItem('proplio_admin','true')
      localStorage.setItem('proplio_admin_ts',Date.now())
      location.href='admin.html'
    } else {
      err.textContent='Identifiants incorrects. Tentative enregistrée.';err.classList.add('on')
      btn.disabled=false;btn.textContent='Accéder au panel →'
    }
  },1200)
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
if(localStorage.getItem('proplio_admin')==='true'){
  const ts=Number(localStorage.getItem('proplio_admin_ts')||0)
  if(Date.now()-ts<4*60*60*1000)location.href='admin.html'
}
</script>
</body>
</html>
